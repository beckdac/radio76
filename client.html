<!DOCTYPE html>
<html>
<head>
    <title>Real-time Spectrogram</title>
    <script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body style="background: #111;">
    <select id="colorscale-picker">
  	<option value="Blackbody">Blackbody</option>
        <option value="Viridis">Viridis</option>
  	<option value="Reds">Reds</option>
  	<option value="Hot">Hot</option>
  	<option value="Magma">Magma</option>
  	<option value="Jet">Jet</option>
  	<option value="YlOrRd">YlOrRd</option>
  	<option value="YlGnBu">YlGnBu</option>
  	<option value="RdBu">RdBu</option>
  	<option value="Portland">Portland</option>
  	<option value="Picnic">Picnic</option>
  	<option value="Greys">Greys</option>
  	<option value="Greens">Greens</option>
  	<option value="Electric">Electric</option>
  	<option value="Earth">Earth</option>
  	<option value="Bluered">Bluered</option>
    </select>
    <div id="heatmap-chart" style="width:100%; height:90vh;"></div>

    <script>
        const socket = io('http://localhost:5000', { transports: ['websocket'] });
        const chartDiv = document.getElementById('heatmap-chart');

        const MAX_HISTORY = 100; // How many time-slices to show
        let spectrogramData = Array(MAX_HISTORY).fill(Array(1025).fill(0));

        const data = [{
            z: spectrogramData,
            type: 'heatmap',
            colorscale: 'Blackbody', // Try 'Hot', 'Magma', or 'Jet', 'Viridis'
            showscale: true,
	    zmin: 0,
	    zmax: 1000,
	    zuto: false
        }];

        const layout = {
            title: { text: 'Live Spectrogram', font: { color: 'white' } },
            paper_bgcolor: '#111',
            plot_bgcolor: '#111',
            xaxis: { title: 'Frequency Bin (max 3kHz)', tickcolor: 'white', font: { color: 'white' } },
            yaxis: { title: 'Time (History)', tickcolor: 'white', font: { color: 'white' } }
        };

        Plotly.newPlot(chartDiv, data, layout);

        socket.on('audio_fft', function(msg) {
            // Remove oldest row, add newest row
            spectrogramData.shift();
            spectrogramData.push(msg.data);

            // Use restyle for high-performance 2D data updates
            Plotly.restyle(chartDiv, { z: [spectrogramData] });
        });

	// Control Event Listener
  	document.getElementById('colorscale-picker').addEventListener('change', function() {
    	    var newScale = this.value;
    	    // Update only the colorscale of the first trace
    	    Plotly.restyle(chartDiv, 'colorscale', [newScale]);
  	});
    </script>
</body>
</html>
